<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NJF REGI 申込</title>
    <style>
        /* 强制全屏和大字体 */
        * { box-sizing: border-box; font-family: sans-serif; }
        body { margin: 0; padding: 0; background: #f0f2f5; width: 100vw; overflow-x: hidden; }
        
        /* 头部：必须是深蓝色 */
        header { background: #1e3a8a; color: white; padding: 40px 20px; text-align: center; width: 100%; }
        header h1 { margin: 0; font-size: 24px; }
        header p { margin: 10px 0 0; font-size: 18px; opacity: 0.9; }

        form { padding: 20px; width: 100%; }
        
        /* 每一项单独一行 */
        .item { margin-bottom: 30px; width: 100%; display: block; }
        label { display: block; font-size: 22px; font-weight: bold; margin-bottom: 12px; color: #333; }
        input[type="text"], input[type="email"], input[type="tel"] { 
            width: 100% !important; 
            height: 70px !important; 
            font-size: 24px !important; 
            padding: 0 15px; 
            border: 3px solid #666; 
            border-radius: 12px; 
            display: block;
        }

        /* 签名区 */
        .sig-label { font-size: 22px; font-weight: bold; margin: 40px 0 10px; color: #1e3a8a; border-left: 10px solid #1e3a8a; padding-left: 15px; }
        .canvas-wrap { border: 4px dashed #1e3a8a; background: white; border-radius: 20px; width: 100%; margin-top: 10px; touch-action: none; }
        
        /* 确认勾选框 */
        .agree-box { background: white; padding: 25px; border-radius: 20px; border: 3px solid #ddd; margin: 40px 0; display: flex; align-items: center; gap: 20px; }
        .agree-box input { width: 40px; height: 40px; }
        .agree-box span { font-size: 22px; font-weight: bold; }

        /* 提交按钮 */
        .sub-btn { background: #1e3a8a; color: white; width: 100%; padding: 30px; font-size: 32px; font-weight: bold; border: none; border-radius: 20px; cursor: pointer; margin-top: 40px; }
    </style>
</head>
<body>

<header>
    <h1>NJF REGI サービス利用申込</h1>
    <p>新日本富士アシスト株式会社</p>
</header>

<form id="mainForm">
    <div class="item">
        <label>契約会社名</label>
        <input type="text" id="companyName" required>
    </div>

    <div class="item">
        <label>代表者氏名</label>
        <input type="text" id="representative" required>
    </div>

    <div class="item">
        <label>店舗名</label>
        <input type="text" id="shopName" required>
    </div>

    <div class="item">
        <label>店舗担当者名</label>
        <input type="text" id="shopManager" required>
    </div>

    <div class="item">
        <label>店舗住所</label>
        <input type="text" id="shopAddress" required>
    </div>

    <div class="sig-label">ご署名</div>
    <div class="canvas-wrap">
        <canvas id="sigPad" style="width: 100%; height: 350px;"></canvas>
    </div>
    <button type="button" onclick="clearSig()" style="width:100%; padding:15px; margin-top:10px; font-size:18px;">書き直す</button>

    <div class="agree-box">
        <input type="checkbox" id="agree" required>
        <span>重要事項に同意する</span>
    </div>

    <button type="submit" class="sub-btn">お申込を確定する</button>
</form>

<script>
    // 配置您的链接
    const API_URL = "https://script.google.com/macros/s/AKfycbwIP-XgdD0fqd4Zhe3tsN7iAWXoIuiEs_7jVBEH6ZXGmESG_4qxNde8k0hrgwAKscz56w/exec"; 

    const canvas = document.getElementById('sigPad');
    const ctx = canvas.getContext('2d');
    let drawing = false;

    // 适配屏幕宽度
    window.onload = () => {
        canvas.width = canvas.offsetWidth;
        canvas.height = 350;
        ctx.lineWidth = 6; ctx.lineCap = 'round'; ctx.strokeStyle = '#000';
    };

    function clearSig() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

    const getPos = (e) => {
        const r = canvas.getBoundingClientRect();
        const tx = e.touches ? e.touches[0].clientX : e.clientX;
        const ty = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: tx - r.left, y: ty - r.top };
    };

    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); drawing = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); });
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); if(!drawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); });
    canvas.addEventListener('touchend', () => drawing = false);

    document.getElementById('mainForm').onsubmit = async (e) => {
        e.preventDefault();
        alert("送信を開始します...");
        // 提交逻辑同步之前版本
    };
</script>

</body>
</html>
