<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>サービス利用申込 | NJF REGI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 强制手机端大字体和满屏布局 */
        body { font-size: 20px; -webkit-text-size-adjust: 100%; background-color: #f1f5f9; }
        .field-group { display: flex; flex-direction: column; width: 100%; margin-bottom: 25px; }
        label { font-size: 22px; font-weight: 800; color: #1e293b; margin-bottom: 10px; }
        input { 
            width: 100% !important; height: 70px !important; font-size: 22px !important; 
            padding: 0 20px !important; border: 3px solid #64748b !important; 
            border-radius: 15px !important; box-sizing: border-box !important;
        }
        .sig-container { border: 4px dashed #1e3a8a; background: #fff; border-radius: 20px; touch-action: none; }
        .section-header { font-size: 26px; font-weight: 900; color: #1e3a8a; border-left: 12px solid #1e3a8a; padding-left: 15px; margin: 40px 0 25px 0; }
        .must { background: #ef4444; color: white; padding: 2px 10px; font-size: 14px; border-radius: 6px; margin-left: 10px; }
    </style>
</head>
<body class="p-0 m-0">
    <div class="w-full bg-white min-h-screen">
        <header class="bg-[#1e3a8a] text-white p-12 text-center">
            <h1 class="text-3xl font-bold tracking-widest">NJF REGI サービス利用申込</h1>
            <p class="text-xl mt-4 font-bold">新日本富士アシスト株式会社</p>
        </header>

        <form id="contractForm" class="p-6 pb-20">
            <h2 class="section-header">1. 契約者情報</h2>
            <div class="field-group">
                <label>契約会社名<span class="must">必須</span></label>
                <input type="text" id="companyName" required placeholder="株式会社〇〇">
            </div>
            <div class="field-group">
                <label>代表者氏名<span class="must">必須</span></label>
                <input type="text" id="representative" required>
            </div>
            <div class="field-group">
                <label>会社住所<span class="must">必須</span></label>
                <input type="text" id="companyAddress" required>
            </div>

            <h2 class="section-header">2. 設置先情報 (店舗)</h2>
            <button type="button" onclick="copyAddr()" class="w-full bg-blue-600 text-white py-6 rounded-2xl font-bold mb-10 text-2xl shadow-lg">住所のみ契約者と同じ</button>
            <div class="field-group">
                <label>店舗名<span class="must">必須</span></label>
                <input type="text" id="shopName" required>
            </div>
            <div class="field-group">
                <label>店舗担当者名<span class="must">必須</span></label>
                <input type="text" id="shopManager" required>
            </div>
            <div class="field-group">
                <label>店舗住所<span class="must">必須</span></label>
                <input type="text" id="shopAddress" required>
            </div>
            <div class="field-group">
                <label>連絡先メール<span class="must">必須</span></label>
                <input type="email" id="email" required placeholder="example@mail.com">
            </div>

            <h2 class="section-header">3. ご署名</h2>
            <div class="sig-container">
                <canvas id="signaturePad" class="w-full" height="350"></canvas>
            </div>
            <button type="button" onclick="clearSig()" class="w-full mt-4 bg-slate-200 py-4 rounded-xl font-bold text-xl mb-10 text-slate-600">書き直す (クリア)</button>

            <h2 class="section-header">4. 確認事項</h2>
            <label class="flex items-center gap-6 p-8 border-4 border-slate-300 rounded-3xl bg-white mb-10 active:bg-blue-50">
                <input type="checkbox" id="agree" required style="width: 45px; height: 45px;">
                <span class="text-2xl font-black">重要事項に同意する</span>
            </label>

            <button type="submit" id="submitBtn" class="w-full bg-[#1e3a8a] text-white font-black py-10 rounded-3xl text-4xl shadow-2xl active:scale-95 transition-all">お申込を確定する</button>
        </form>
    </div>

    <script>
        // ======= 在这里填入您的 GAS 部署链接 =======
        const API_URL = "https://script.google.com/macros/s/AKfycbwc_BBdZXaNP7A095e9-2g9l5uFhFxXB2CLqbpu4asXuFcAk5RAuzuWvXzTt5AbNR5G/exec"; 
        // =========================================

        const canvas = document.getElementById('signaturePad');
        const ctx = canvas.getContext('2d');
        let drawing = false;

        window.onload = () => {
            canvas.width = canvas.offsetWidth;
            ctx.lineWidth = 6; ctx.lineJoin = 'round'; ctx.lineCap = 'round'; ctx.strokeStyle = '#000';
        };

        function copyAddr() { document.getElementById('shopAddress').value = document.getElementById('companyAddress').value; }
        function clearSig() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

        const getPos = (e) => {
            const r = canvas.getBoundingClientRect();
            const tx = e.touches ? e.touches[0].clientX : e.clientX;
            const ty = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: tx - r.left, y: ty - r.top };
        };
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); drawing = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); });
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); if(!drawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); });
        canvas.addEventListener('touchend', () => drawing = false);

        document.getElementById('contractForm').onsubmit = async (e) => {
            e.preventDefault();
            const isBlank = canvas.toDataURL() === canvas.cloneNode().toDataURL();
            if(isBlank) { alert("署名をお願いします。"); return; }
            
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.innerText = "送信中...";

            const payload = {
                companyName: document.getElementById('companyName').value,
                companyAddress: document.getElementById('companyAddress').value,
                representative: document.getElementById('representative').value,
                shopName: document.getElementById('shopName').value,
                shopManager: document.getElementById('shopManager').value,
                shopAddress: document.getElementById('shopAddress').value,
                email: document.getElementById('email').value,
                signature: canvas.toDataURL('image/png')
            };

            try {
                const res = await fetch(API_URL, { method: "POST", body: JSON.stringify(payload) });
                const resData = await res.json();
                if(resData.status === "success") { alert("お申込が完了しました！邮件をご確認ください。"); location.reload(); }
                else { throw new Error(resData.msg); }
            } catch (err) {
                alert("エラー: " + err.message);
                btn.disabled = false; btn.innerText = "お申込を確定する";
            }
        };
    </script>
</body>
</html>
