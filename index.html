<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>サービス利用申込 | NJF REGI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .must { background: #e3342f; color: white; padding: 2px 5px; font-size: 10px; border-radius: 2px; margin-left: 5px; }
        .terms-box { height: 120px; overflow-y: scroll; border: 1px solid #ddd; padding: 10px; font-size: 12px; background: #f9f9f9; line-height: 1.5; }
    </style>
</head>
<body class="bg-slate-50 p-4">
    <div class="max-w-xl mx-auto bg-white shadow-2xl rounded-2xl overflow-hidden">
        <div class="bg-blue-900 p-6 text-white text-center">
            <h1 class="text-xl font-bold">NJF REGI サービス利用申込</h1>
        </div>

        <form id="contractForm" class="p-6 space-y-6">
            <section class="space-y-3">
                <h2 class="font-bold border-l-4 border-blue-900 pl-2">1. 重要事項の確認</h2>
                <div class="terms-box rounded">
                    <p class="font-bold underline mb-1">【契約重要事項説明】</p>
                    <p>・本サービスの契約期間は2年間です。満了後は2年毎の自動更新となります。</p>
                    <p>・最低利用期間（24ヶ月）内の解約は、残余期間分の料金が発生します。</p>
                    <p>・データ保存期間は24ヶ月です。バックアップは自己責任となります。</p>
                </div>
                <label class="flex items-center text-sm cursor-pointer">
                    <input type="checkbox" required class="w-4 h-4 mr-2"> 規約及び重要事項に同意する <span class="must">必須</span>
                </label>
            </section>

            <section class="space-y-4">
                <h2 class="font-bold border-l-4 border-blue-900 pl-2">2. 契約者・設置先情報</h2>
                <div>
                    <label class="block text-sm font-bold mb-1">契約会社名 / 商号 <span class="must">必須</span></label>
                    <input type="text" id="companyName" required class="w-full border rounded p-2" placeholder="例：株式会社NJF">
                </div>
                
                <div class="pt-2 border-t">
                    <div class="flex justify-between items-center mb-1">
                        <label class="block text-sm font-bold">設置先店舗名</label>
                        <button type="button" onclick="copyName()" class="text-[10px] bg-slate-200 px-2 py-1 rounded hover:bg-slate-300">契約会社名と同じ</button>
                    </div>
                    <input type="text" id="shopName" required class="w-full border rounded p-2" placeholder="例：銀河苑">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div><label class="block text-sm font-bold mb-1">代表者名 <span class="must">必須</span></label><input type="text" id="representative" required class="w-full border rounded p-2"></div>
                    <div><label class="block text-sm font-bold mb-1">電話番号 <span class="must">必須</span></label><input type="tel" id="phone" required class="w-full border rounded p-2"></div>
                </div>
                <div><label class="block text-sm font-bold mb-1">メールアドレス <span class="must">必須</span></label><input type="email" id="email" required class="w-full border rounded p-2"></div>
            </section>

            <section class="space-y-4">
                <h2 class="font-bold border-l-4 border-blue-900 pl-2">3. 設置機器・利用プラン</h2>
                <div id="product-list" class="space-y-2"></div>

                <div class="bg-blue-50 p-4 rounded-xl border border-blue-100">
                    <label class="text-xs font-bold text-blue-900 mb-2 block">基本利用料 (必須選択)</label>
                    <div class="grid grid-cols-2 gap-2">
                        <label class="flex flex-col items-center p-2 bg-white border-2 rounded-lg cursor-pointer has-[:checked]:border-blue-900">
                            <input type="radio" name="basePlan" value="monthly" checked class="hidden" onchange="calc()">
                            <span class="text-[10px]">月額プラン</span><span class="font-bold text-sm">￥8,000</span>
                        </label>
                        <label class="flex flex-col items-center p-2 bg-white border-2 rounded-lg cursor-pointer has-[:checked]:border-blue-900">
                            <input type="radio" name="basePlan" value="yearly" class="hidden" onchange="calc()">
                            <span class="text-[10px]">年額プラン</span><span class="font-bold text-sm">￥80,000</span>
                        </label>
                    </div>
                </div>

                <label class="flex items-center justify-between p-3 bg-slate-50 border rounded-xl cursor-pointer">
                    <div class="flex items-center">
                        <input type="checkbox" id="qrOption" class="w-5 h-5 mr-3 accent-blue-900" onchange="calc()">
                        <div><span class="font-bold text-sm">QR注文サービス</span><p id="qrPriceHint" class="text-[10px] text-slate-500">月額 +￥4,000</p></div>
                    </div>
                    <div id="qrActivePrice" class="font-bold text-blue-900">￥0</div>
                </label>

                <div class="bg-slate-900 text-white p-5 rounded-2xl text-center shadow-lg">
                    <p class="text-[10px] opacity-60">初期費用 合計 (10%税込)</p>
                    <p id="total-display" class="text-3xl font-bold">￥0</p>
                </div>
            </section>

            <button type="submit" id="submitBtn" class="w-full bg-blue-900 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-blue-800 transition-all">お申込を確定する</button>
        </form>
    </div>

    <script>
        let productData = [];
        const API_URL = "https://script.google.com/macros/s/AKfycbzlwPyHBcBpAYdx1iXHJBUNKV8vdBuSR1vOTaeo1G51Dl5JSttv3xs-VPgVSBYri-X2fA/exec"; // <--- 请修改这里！

        // 1. 获取商品数据并渲染
        fetch(API_URL).then(res => res.json()).then(data => {
            productData = data;
            const list = document.getElementById('product-list');
            data.forEach((p, i) => {
                if(p.name.includes("利用料") || p.name.includes("QR")) return; // 排除重复
                list.innerHTML += `
                    <div class="flex items-center justify-between p-3 bg-white border rounded-lg">
                        <span class="text-xs font-bold">${p.name} <small class="text-slate-400 font-normal">(￥${p.price.toLocaleString()})</small></span>
                        <input type="number" value="0" min="0" data-index="${i}" class="qty-input w-12 border rounded p-1 text-center" onchange="calc()">
                    </div>`;
            });
            calc();
        });

        function copyName() { document.getElementById('shopName').value = document.getElementById('companyName').value; }

        // 2. 联动计算逻辑
        function calc() {
            let total = 0;
            const isYearly = document.querySelector('input[name="basePlan"]:checked').value === 'yearly';
            const qrEnabled = document.getElementById('qrOption').checked;

            document.querySelectorAll('.qty-input').forEach(input => {
                total += input.value * productData[input.dataset.index].price * 1.1;
            });

            const basePrice = isYearly ? 80000 : 8000;
            const qrPrice = isYearly ? 40000 : 4000;
            total += basePrice * 1.1;

            document.getElementById('qrPriceHint').innerText = isYearly ? "年額 +￥40,000" : "月額 +￥4,000";
            if(qrEnabled) {
                total += qrPrice * 1.1;
                document.getElementById('qrActivePrice').innerText = "￥" + (qrPrice * 1.1).toLocaleString();
            } else {
                document.getElementById('qrActivePrice').innerText = "￥0";
            }
            document.getElementById('total-display').innerText = "￥" + Math.floor(total).toLocaleString();
        }

        // 3. 提交表单
        document.getElementById('contractForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.innerText = "送信中...";

            // 构建选中的商品明细
            const items = [];
            document.querySelectorAll('.qty-input').forEach(input => {
                if(input.value > 0) {
                    const p = productData[input.dataset.index];
                    items.push({ name: p.name, count: input.value, subtotal: input.value * p.price * 1.1 });
                }
            });
            // 加入利用料和QR
            const isYearly = document.querySelector('input[name="basePlan"]:checked').value === 'yearly';
            items.push({ name: isYearly ? "基本利用料(年額)" : "基本利用料(月額)", count: 1, subtotal: (isYearly ? 80000 : 8000) * 1.1 });
            if(document.getElementById('qrOption').checked) {
                items.push({ name: isYearly ? "QR注文(年額)" : "QR注文(月額)", count: 1, subtotal: (isYearly ? 40000 : 4000) * 1.1 });
            }

            const payload = {
                companyName: document.getElementById('companyName').value,
                shopName: document.getElementById('shopName').value,
                representative: document.getElementById('representative').value,
                phone: document.getElementById('phone').value,
                email: document.getElementById('email').value,
                items: items,
                total: document.getElementById('total-display').innerText
            };

            const response = await fetch(API_URL, { method: "POST", body: JSON.stringify(payload) });
            const result = await response.json();
            if(result.status === "success") {
                alert("お申込が完了しました。メールをご確認ください。");
                location.reload();
            } else {
                alert("エラーが発生しました: " + result.msg);
                btn.disabled = false; btn.innerText = "お申込を確定する";
            }
        };
    </script>
</body>
</html>
